syntax = "proto3";

package dungeon_game.dungeon;

enum RoomType {
  ROOM_TYPE_UNKNOWN = 0;
  ROOM_TYPE_COMBAT = 1;
  ROOM_TYPE_TREASURE = 2;
  ROOM_TYPE_BOSS = 3;
}

service DungeonArchitect {
  rpc GenerateRoom (RoomRequest) returns (DungeonRoom);
}

message RoomRequest {

}

message DungeonRoom {
  int32 room_id = 1;
  RoomType room_type = 2;
  int32 width = 3;
  int32 height = 4;
}

