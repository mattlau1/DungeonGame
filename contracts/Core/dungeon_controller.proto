syntax = "proto3";

package dungeon_game.core;

import "Core/movement.proto";
import "Core/player.proto";
import "Core/room.proto";
import "Core/status.proto";
import "google/protobuf/empty.proto";

service DungeonController {
  rpc GetRoomInfo (RoomInfoRequest) returns (RoomInfo);
  rpc SubscribeRoom (SubscribeRoomRequest) returns (stream RoomSnapshot);
  rpc SendInputCommand (stream InputCommandRequest) returns (stream google.protobuf.Empty);
  rpc SpawnPlayer (SpawnRequest) returns (PlayerInfo);
  rpc GetPlayerInfo (PlayerInfoRequest) returns (PlayerInfo);
  rpc DisconnectPlayer (DisconnectRequest) returns (google.protobuf.Empty);
  rpc GetServerStatus (google.protobuf.Empty) returns (ServerStatusResponse);
}
