syntax = "proto3";

package dungeon_game.core;

import "Shared/shared_types.proto";

service PlayerController {
  rpc SpawnPlayer (SpawnRequest) returns (PlayerInfo);
  rpc GetPlayerInfo (PlayerInfoRequest) returns (PlayerInfo);
}

message SpawnRequest {
  int32 room_id = 1;
  dungeon_game.shared.Location location = 2;
}

message PlayerInfo {
  int32 id = 1;
  int32 room_id = 2;
  dungeon_game.shared.Location location = 3;
}

message PlayerInfoRequest {
  int32 player_id = 1;
}
