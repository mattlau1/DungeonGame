syntax = "proto3";

package dungeon_game.core;

import "Shared/shared_types.proto";

message SetMovementInputRequest {
  int32 player_id = 1;

  // Desired movement direction. Typical values are in [-1, 1].
  // (0,0) means "stop".
  float input_x = 2;
  float input_y = 3;
}

message SetMovementInputResponse {
  InputResult result = 1;
  dungeon_game.shared.Location authoritative_location = 2;
  string debug_message = 3;
}

enum InputResult {
  INPUT_RESULT_UNSPECIFIED = 0;
  INPUT_RESULT_OK = 1;
  INPUT_RESULT_INVALID_PLAYER = 2;
  INPUT_RESULT_INVALID_ROOM = 3;
}
