syntax = "proto3";

package dungeon_game.core;

message InputCommandRequest {
  int32 player_id = 1;

  // Desired movement direction. Typical values are in [-1, 1].
  // (0,0) means "stop".
  float input_x = 2;
  float input_y = 3;

  // Sequence number from client for ordering/reconciliation
  uint32 sequence = 4;
}