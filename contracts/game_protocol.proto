syntax = "proto3";

package dungeonGame.protocol;

message DungeonRoom {
  int32 room_id = 1;
  string room_type = 2; // e.g., "Combat", "Treasure", "Boss"
  int32 width = 3;
  int32 height = 4;

  repeated Enemy initial_enemies = 5;
  repeated Item spawnable_items = 6;
}

message Enemy {
  string type = 1;
  float x = 2;
  float y = 3;
  int32 health = 4;
}

message Item {
  int32 item_id = 1;
  string name = 2;
}

service DungeonArchitect {
  rpc GetNextRoom (RoomRequest) returns (DungeonRoom);
}

message RoomRequest {
  int32 seed = 1;
  int32 floor_level = 2;
}