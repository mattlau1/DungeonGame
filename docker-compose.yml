services:
  dungeon-server:
    build:
      context: .
      dockerfile: DungeonServer/Dockerfile
    ports:
      - "5142:8080"
      - "5143:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DbConnection=Host=postgres;Port=5432;Database=dungeon_db;Username=dungeon_user;Password=dungeon_password
      - Redis__Configuration=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: dungeon_user
      POSTGRES_PASSWORD: dungeon_password
      POSTGRES_DB: dungeon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c max_connections=1000
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dungeon_user -d dungeon_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
